              : '<span class="w-fit rounded-lg border border-green-200 bg-green-50 px-3 py-1.5 text-xs font-semibold text-green-700">Terverifikasi</span>';

            return `
              <div class="grid gap-3 px-4 py-4 lg:grid-cols-[minmax(140px,1fr)_minmax(180px,1fr)_120px_150px_120px_130px_110px_minmax(150px,auto)] lg:items-center" data-upgrade-request-row data-payment-id="${id}" data-username="${username}">
                <p class="font-semibold text-[#111111]">${username}</p>
                <p class="truncate text-sm text-[#525252]" title="${email}">${email}</p>
                <p class="text-sm font-semibold text-[#111111]">${paket}</p>
                <p class="text-sm text-[#525252]">${requestTime}</p>
                <button class="w-full rounded-lg border border-[#d4d4d4] bg-white px-3 py-2 text-sm font-semibold text-[#111111] transition-colors hover:border-[#111111] hover:bg-[#111111] hover:text-white lg:w-fit" type="button" data-view-upgrade-proof="${id}">Lihat Bukti</button>
                <p class="text-sm text-[#525252]">Diproses saat verifikasi</p>
                <div>${statusBadge}</div>
                <div class="flex flex-col gap-2 sm:flex-row lg:justify-end">
                  ${isPending
                    ? `<button class="w-full rounded-lg bg-[#111111] px-3 py-2 text-sm font-semibold text-white transition-colors hover:bg-[#2b2b2b] sm:w-auto" type="button" data-verify-upgrade-request="${id}">Verifikasi</button>`
                    : ""}
                  <button class="w-full rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm font-semibold text-red-700 transition-colors hover:bg-red-600 hover:text-white sm:w-auto" type="button" data-delete-upgrade-request="${id}">Delete</button>
                </div>
              </div>
            `;
          }).join("");
        }

        async function loadUpgradeRequests() {
          upgradeRequestList.innerHTML = '<div class="p-8 text-center text-sm font-medium text-[#737373]">Memuat permintaan upgrade...</div>';
          try {
            const response = await fetch("/admin/api/payments?type=renewal", { credentials: "same-origin" });
            const result = await response.json();
            if (!response.ok || !result.success) {
              throw new Error(result.message || "Gagal memuat permintaan upgrade.");
            }

            upgradePayments = Array.isArray(result.data) ? result.data : [];
            renderUpgradeRequests();
          } catch (error) {
            upgradePayments = [];
            upgradeRequestList.innerHTML = `<div class="p-8 text-center text-sm font-medium text-red-700">${escapeUpgradeHtml(error.message || "Gagal memuat permintaan upgrade.")}</div>`;
          }
        }

        function openUpgradeProof(payment) {
          if (!payment?.bukti_pembayaran || !proofModal || !proofImage) {
            window.alert("Bukti pembayaran tidak tersedia.");
            return;
          }

          const proof = String(payment.bukti_pembayaran).trim();
          if (!proof) {
            window.alert("Bukti pembayaran tidak tersedia.");
            return;
          }

          proofImage.onerror = () => {
            proofModal.classList.add("hidden");
            proofImage.src = "";
            window.alert("Gagal membuka gambar bukti pembayaran.");
          };
          proofImage.onload = () => {
            proofImage.onerror = null;
          };
          proofImage.src = proof.startsWith("data:") ? proof : `data:image/jpeg;base64,${proof}`;
          proofModal.classList.remove("hidden");
        }

        async function verifyUpgrade(payment, button) {
          button.disabled = true;
          button.textContent = "Memproses...";
          try {
            const response = await fetch("/admin/api/payments/verify", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              credentials: "same-origin",
              body: JSON.stringify({ payment_id: payment.id }),
            });
            const result = await response.json();
            if (!response.ok || !result.success) {
              throw new Error(result.message || "Gagal verifikasi upgrade.");
            }

            await loadUpgradeRequests();
          } catch (error) {
            window.alert(error.message || "Gagal verifikasi upgrade.");
            button.disabled = false;
            button.textContent = "Verifikasi";
          }
        }

        async function deleteUpgrade(payment, button) {
          if (!window.confirm(`Hapus permintaan upgrade ${payment.username || "user"}?`)) return;

          button.disabled = true;
          button.textContent = "Menghapus...";
          try {
            const response = await fetch("/admin/api/payments/delete", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              credentials: "same-origin",
              body: JSON.stringify({ payment_id: payment.id }),
            });
            const result = await response.json();
            if (!response.ok || !result.success) {
              throw new Error(result.message || "Gagal menghapus permintaan upgrade.");
            }

            await loadUpgradeRequests();
          } catch (error) {
            window.alert(error.message || "Gagal menghapus permintaan upgrade.");
            button.disabled = false;
            button.textContent = "Delete";
          }
        }

        closeProofModal?.addEventListener("click", () => {
          proofModal?.classList.add("hidden");
          if (proofImage) proofImage.src = "";
        });

        proofModal?.addEventListener("click", (event) => {
          if (event.target === proofModal) {
            proofModal.classList.add("hidden");
            if (proofImage) proofImage.src = "";
          }
        });

        upgradeRequestList.addEventListener("click", (event) => {
          const target = event.target;
          if (!(target instanceof Element)) return;

          const proofButton = target.closest("[data-view-upgrade-proof]");
          if (proofButton) {
            const payment = upgradePayments.find((item) => item.id === proofButton.getAttribute("data-view-upgrade-proof"));
            if (payment) openUpgradeProof(payment);
            return;
          }

          const verifyButton = target.closest("[data-verify-upgrade-request]");
          if (verifyButton) {
            const payment = upgradePayments.find((item) => item.id === verifyButton.getAttribute("data-verify-upgrade-request"));
            if (payment) verifyUpgrade(payment, verifyButton);
            return;
          }

          const deleteButton = target.closest("[data-delete-upgrade-request]");
          if (deleteButton) {
            const payment = upgradePayments.find((item) => item.id === deleteButton.getAttribute("data-delete-upgrade-request"));
            if (payment) deleteUpgrade(payment, deleteButton);
          }
        });

        loadUpgradeRequests();
      }

      updateTotal();
    }

    function initNavigation() {
      const navButtons = document.querySelectorAll(".nav-btn");

      navButtons.forEach((btn) => {
        btn.addEventListener("click", () => {
          const targetPage = btn.dataset.page;
          if (!pages.includes(targetPage)) return;

          loadPage(targetPage);
          window.history.pushState({}, "", getPageUrl(targetPage));
        });
      });
    }

    window.addEventListener("popstate", () => {
      loadPage(getInitialPage());
    });
  </script>
</body>
</html>
