<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wakirim Client</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#f4f4f5] font-sans text-[#111111] antialiased">
  <div class="flex">
    <!-- Sidebar - Sticky on desktop -->
    <div class="sticky top-0 h-screen w-[280px] flex-shrink-0">
      <div data-sidebar-src="/page/client/sidebar.html"></div>
    </div>

    <!-- Main Content - Scrollable -->
    <main id="page-content" class="min-w-0 flex-1 p-5 md:p-9">
      <!-- Content loaded dynamically -->
    </main>
  </div>

  <script>
    const sidebarMount = document.querySelector("[data-sidebar-src]");
    const pageContent = document.getElementById("page-content");
    const pages = ["dashboard", "scrape", "history", "berlangganan", "account"];

    // Fetch sidebar
    if (sidebarMount) {
      fetch(sidebarMount.dataset.sidebarSrc)
        .then((response) => {
          if (!response.ok) throw new Error("Sidebar not found");
          return response.text();
        })
        .then((html) => {
          sidebarMount.innerHTML = html;
          initNavigation();
          loadPage(getInitialPage());
        })
        .catch(() => {
          sidebarMount.innerHTML = "";
        });
    }

    function getInitialPage() {
      const hashPage = window.location.hash.substring(1);
      const migratedHashPage = hashPage === "config"
        ? "scrape"
        : (hashPage === "system-info" ? "berlangganan" : hashPage);
      if (pages.includes(migratedHashPage)) {
        window.history.replaceState({}, "", getPageUrl(migratedHashPage));
        return migratedHashPage;
      }

      const page = new URLSearchParams(window.location.search).get("page");
      const migratedPage = page === "system-info" ? "berlangganan" : page;
      return pages.includes(migratedPage) ? migratedPage : "dashboard";
    }

    function getPageUrl(pageName) {
      return pageName === "dashboard" ? "/dashboard" : `/dashboard?page=${encodeURIComponent(pageName)}`;
    }

    function setActiveNavigation(targetPage) {
      document.querySelectorAll(".nav-btn").forEach((btn) => {
        if (btn.dataset.page === targetPage) {
          btn.classList.add("border-[#111111]", "bg-[#111111]", "text-white");
          btn.classList.remove("border-transparent", "text-[#737373]", "hover:bg-[#f5f5f5]");
          const iconSpan = btn.querySelector("span:first-child");
          if (iconSpan) {
            iconSpan.classList.add("bg-white", "text-[#111111]");
            iconSpan.classList.remove("border-[#e5e7eb]", "bg-[#fafafa]", "text-[#737373]");
          }
        } else {
          btn.classList.remove("border-[#111111]", "bg-[#111111]", "text-white");
          btn.classList.add("border-transparent", "text-[#737373]", "hover:bg-[#f5f5f5]");
          const iconSpan = btn.querySelector("span:first-child");
          if (iconSpan) {
            iconSpan.classList.remove("bg-white", "text-[#111111]");
            iconSpan.classList.add("border-[#e5e7eb]", "bg-[#fafafa]", "text-[#737373]");
          }
        }
      });
    }

    function loadPage(pageName) {
      const templatePageName = pageName === "berlangganan" ? "system-info" : pageName;
      fetch(`/page/client/page-${templatePageName}.html`)
        .then((response) => {
          if (!response.ok) throw new Error("Page not found");
          return response.text();
        })
        .then((html) => {
          pageContent.innerHTML = html;
          setActiveNavigation(pageName);
          initPage(pageName);
        })
        .catch(() => {
          pageContent.innerHTML = "<p class='rounded-lg border border-[#e5e7eb] bg-white p-4 text-sm font-medium text-[#111111]'>Page not found</p>";
        });
    }

    function initNavigation() {
      const navButtons = document.querySelectorAll(".nav-btn");

      navButtons.forEach((btn) => {
        btn.addEventListener("click", () => {
          const targetPage = btn.dataset.page;
          if (!pages.includes(targetPage)) return;

          // Load page content
          loadPage(targetPage);

          // Update URL without hash
          window.history.pushState({}, "", getPageUrl(targetPage));
        });
      });
    }

    function initPage(pageName) {
      if (pageName === "scrape") {
        initScrapePage();
        return;
      }

      if (pageName === "history") {
        initHistoryPage();
        return;
      }

      if (pageName === "account") {
        initAccountPage();
        return;
      }

      if (pageName === "berlangganan") {
        initBerlanggananPage();
      }
    }

    function initBerlanggananPage() {
      const durationInputs = pageContent.querySelectorAll('input[name="duration-plan"]');
      const totalPriceText = pageContent.querySelector("#subscription-total-price");
      const headerBadge = pageContent.querySelector(".header-active-badge");
      const daysRemaining = pageContent.querySelector("#days-remaining");
      const expiryDateText = pageContent.querySelector("#expiry-date-text");
      const paketAktif = pageContent.querySelector("#paket-aktif");
      const tanggalMulai = pageContent.querySelector("#tanggal-mulai");
      const accountStatus = pageContent.querySelector("#account-status");
      const nextExpiryPreview = pageContent.querySelector("#next-expiry-preview");
      const renewalProofInput = pageContent.querySelector("#renewal-proof-input");
      const renewalPayButton = pageContent.querySelector("#renewal-pay-button");
      const renewalPaymentStatus = pageContent.querySelector("#renewal-payment-status");
      let currentAccountData = null;

      if (!durationInputs.length || !totalPriceText) return;

      function formatRupiah(number) {
        return `Rp${Number(number || 0).toLocaleString("id-ID")}`;
      }

      function calculateDaysRemaining(expiryDateStr) {
        if (!expiryDateStr) return null;
        const expiryDate = new Date(expiryDateStr);
        if (isNaN(expiryDate.getTime())) return null;
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        expiryDate.setHours(0, 0, 0, 0);
        const diffTime = expiryDate - today;
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        return diffDays;
      }

      function formatDisplayDate(dateStr) {
        if (!dateStr) return "-";
        const date = new Date(dateStr);
        if (isNaN(date.getTime())) return dateStr;
        const day = String(date.getDate()).padStart(2, "0");
        const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        return `${day} ${months[date.getMonth()]} ${date.getFullYear()}, 23:59 WIB`;
      }

      function formatPaketName(paket) {
        const value = String(paket || "").trim();
        if (!value) return "-";

        const paketLabels = {
          "starter": "Starter",
          "growth": "Growth",
          "best-value": "Best Value",
          "manual": "Manual",
        };

        return paketLabels[value] || value
          .split(/[-_\s]+/)
          .filter(Boolean)
          .map((word) => word.charAt(0).toUpperCase() + word.slice(1))
          .join(" ");
      }

      function getStatusText(daysRemaining) {
        if (daysRemaining === null) return { text: "Tidak Diketahui", isActive: false };
        if (daysRemaining < 0) return { text: "Berakhir", isActive: false };
        if (daysRemaining <= 7) return { text: "Akan Berakhir", isActive: true };
        return { text: "Aktif", isActive: true };
      }

      function updateTotalFromSelection() {
        const selected = Array.from(durationInputs).find((input) => input.checked);
        const price = Number(selected?.dataset.price || 0);
        totalPriceText.textContent = formatRupiah(price);
      }

      function getSelectedPlanInput() {
        return Array.from(durationInputs).find((input) => input.checked) || null;
      }

      function setRenewalStatus(message, tone) {
        if (!renewalPaymentStatus) return;

        const toneClass = tone === "error"
          ? "border-red-200 bg-red-50 text-red-700"
          : "border-green-200 bg-green-50 text-green-700";

        renewalPaymentStatus.className = `mt-3 rounded-lg border px-3 py-2 text-sm font-medium ${toneClass}`;
        renewalPaymentStatus.textContent = message;
        renewalPaymentStatus.classList.remove("hidden");
      }

      async function loadAccountData() {
        try {
          const response = await fetch("/oauth/me", { credentials: "same-origin" });
          const result = await response.json();

          if (!response.ok || !result.success || !result.data) {
            throw new Error(result.message || "Gagal mengambil data akun");
          }

          const data = result.data;
          currentAccountData = data;
          const days = calculateDaysRemaining(data.tanggal_berakhir);
          const statusInfo = getStatusText(days);

          if (daysRemaining) {
            if (days !== null && days >= 0) {
              daysRemaining.textContent = `${days} hari`;
            } else if (days !== null) {
              daysRemaining.textContent = "Berakhir";
            } else {
              daysRemaining.textContent = "-";
            }
          }

          if (expiryDateText) {
            expiryDateText.textContent = data.tanggal_berakhir
              ? `Berakhir pada ${formatDisplayDate(data.tanggal_berakhir)}`
              : "-";
          }

          if (headerBadge) {
            headerBadge.textContent = data.status && data.status.toLowerCase() !== "habis" && data.status.toLowerCase() !== "berakhir"
              ? `${data.status} aktif`
              : "Berakhir";
          }

          if (paketAktif) {
            paketAktif.textContent = formatPaketName(data.paket);
          }

          if (tanggalMulai) {
            tanggalMulai.textContent = data.tanggal_daftar
              ? formatDisplayDate(data.tanggal_daftar).split(",")[0]
              : "-";
          }

          if (accountStatus) {
            accountStatus.textContent = statusInfo.text;
            accountStatus.className = statusInfo.isActive
              ? "text-sm font-semibold text-[#111111]"
              : "text-sm font-semibold text-red-600";
          }

          if (nextExpiryPreview) {
            if (data.tanggal_berakhir) {
              const nextDate = new Date(data.tanggal_berakhir);
              nextDate.setHours(23, 59, 59, 999);
              nextDate.setDate(nextDate.getDate() + 1);
              nextExpiryPreview.textContent = formatDisplayDate(nextDate.toISOString()).split(",")[0];
            }
          }
        } catch (error) {
          console.error("Failed to load account data:", error);
        }
      }

      durationInputs.forEach((input) => {
        input.addEventListener("change", updateTotalFromSelection);
      });

      renewalPayButton?.addEventListener("click", async () => {
        const selectedPlan = getSelectedPlanInput();
        const proofFile = renewalProofInput?.files?.[0] || null;

        if (!currentAccountData) {
          setRenewalStatus("Data akun belum siap. Silakan tunggu sebentar lalu coba lagi.", "error");
          return;
        }

        if (!selectedPlan) {
          setRenewalStatus("Pilih durasi perpanjangan terlebih dahulu.", "error");
          return;
        }

        if (!proofFile) {
          setRenewalStatus("Upload bukti pembayaran terlebih dahulu.", "error");
          return;
        }

        const originalText = renewalPayButton.textContent;
        renewalPayButton.disabled = true;
        renewalPayButton.textContent = "Mengirim...";
        renewalPaymentStatus?.classList.add("hidden");

        try {
          const formData = new FormData();
          formData.append("username", currentAccountData.username || "");
          formData.append("email", currentAccountData.email || "");
          formData.append("paket", selectedPlan.dataset.plan || selectedPlan.value);
          formData.append("catatan", "Perpanjangan akun dari halaman client");
          formData.append("bukti_pembayaran", proofFile);

          const response = await fetch("/api/payment", {
            method: "POST",
            body: formData,
            credentials: "same-origin",
          });
          const result = await response.json();

          if (!response.ok || !result.success) {
            throw new Error(result.message || "Gagal mengirim permintaan perpanjangan.");
          }

          if (renewalProofInput) renewalProofInput.value = "";
          setRenewalStatus("Permintaan perpanjangan berhasil dikirim. Admin akan memverifikasi bukti pembayaran Anda.", "success");
        } catch (error) {
          setRenewalStatus(error.message || "Gagal mengirim permintaan perpanjangan.", "error");
        } finally {
          renewalPayButton.disabled = false;
          renewalPayButton.textContent = originalText || "Bayar";
        }
      });

      updateTotalFromSelection();
      loadAccountData();
    }

    function initAccountPage() {
      const passwordText = pageContent.querySelector("[data-account-password]");
      const toggleButton = pageContent.querySelector("[data-toggle-account-password]");
      const eyeOpen = pageContent.querySelector("[data-eye-open]");
      const eyeClosed = pageContent.querySelector("[data-eye-closed]");
      const logoutButton = pageContent.querySelector("[data-client-logout]");
      const deleteAccountButton = pageContent.querySelector("[data-client-delete-account]");
      const usernameText = pageContent.querySelector("#account-username");
      const registeredAtText = pageContent.querySelector("#account-registered-at");
      const expiredAtText = pageContent.querySelector("#account-expired-at");
      const passwordNoteText = pageContent.querySelector("#account-password-note");
      const complaintEmailInput = pageContent.querySelector("#complaint-email-input");
      const complaintTitleInput = pageContent.querySelector("#complaint-title-input");
      const complaintDescriptionInput = pageContent.querySelector("#complaint-description-input");
      const complaintStatus = pageContent.querySelector("#complaint-form-status");
      const sendComplaintButton = pageContent.querySelector("[data-send-client-complaint]");
      
      const changePasswordOld = pageContent.querySelector("#change-password-old");
      const changePasswordNew = pageContent.querySelector("#change-password-new");
      const changePasswordConfirm = pageContent.querySelector("#change-password-confirm");
      const changePasswordStatus = pageContent.querySelector("#change-password-status");
      const changePasswordSubmit = pageContent.querySelector("#change-password-submit");
      const complaintHistoryContainer = pageContent.querySelector("#complaint-history-container");

      async function loadPengaduanHistory() {
        if (!complaintHistoryContainer) return;

        try {
          const response = await fetch("/oauth/pengaduan", { credentials: "same-origin" });
          const result = await response.json();

          if (!response.ok || !result.success) {
            throw new Error(result.message || "Gagal mengambil riwayat pengaduan");
          }

          const data = result.data || [];
          if (data.length === 0) {
            complaintHistoryContainer.innerHTML = '<p class="text-sm text-[#737373] text-center py-4">Belum ada pengaduan yang dikirim.</p>';
            return;
          }

          complaintHistoryContainer.innerHTML = data.map(item => `
            <div class="rounded-lg border border-[#e5e7eb] bg-[#fafafa] p-4">
              <div class="flex items-center justify-between gap-3 mb-2">
                <h3 class="font-semibold text-[#111111] text-sm">${item.judul}</h3>
                <span class="rounded-full px-2 py-0.5 text-[11px] font-medium ${item.status === 'ditanggapi' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}">${item.status === 'ditanggapi' ? 'Ditanggapi' : 'Menunggu'}</span>
              </div>
              <p class="text-sm text-[#525252] whitespace-pre-wrap">${item.deskripsi}</p>
              <p class="mt-2 text-[11px] text-[#737373]">${item.tanggal_dibuat}</p>
              
              ${item.status === 'ditanggapi' && item.jawaban ? `
                <div class="mt-3 rounded border border-green-200 bg-green-50 p-3">
                  <p class="text-xs font-semibold text-green-800 mb-1">Tanggapan Admin:</p>
                  <p class="text-sm text-green-900 whitespace-pre-wrap">${item.jawaban}</p>
                  <p class="mt-2 text-[11px] text-green-700">${item.tanggal_ditanggapi}</p>
                </div>
              ` : ''}
            </div>
          `).join('');
        } catch (error) {
          complaintHistoryContainer.innerHTML = `<p class="text-sm text-red-500 text-center py-4">${error.message}</p>`;
        }
      }

      async function loadAccountProfile() {        try {
          const response = await fetch("/oauth/me", {
            credentials: "same-origin",
          });
          const result = await response.json();
          if (!response.ok || !result.success || !result.data) {
            throw new Error(result.message || "Gagal mengambil data akun.");
          }

          const data = result.data;
          if (usernameText) usernameText.textContent = data.username || "-";
          if (registeredAtText) registeredAtText.textContent = data.tanggal_daftar || "-";
          if (expiredAtText) expiredAtText.textContent = data.tanggal_berakhir || "-";
          if (complaintEmailInput) complaintEmailInput.value = data.email || "";

          if (passwordText) {
            passwordText.dataset.passwordValue = "Tersimpan terenkripsi";
            passwordText.textContent = "********";
            passwordText.dataset.visible = "false";
          }

          if (passwordNoteText) {
            passwordNoteText.textContent = "Password tidak dapat di tampilkan, silahkan cek email untuk melihat password.";
          }
        } catch (_) {
          if (usernameText) usernameText.textContent = "-";
          if (registeredAtText) registeredAtText.textContent = "-";
          if (expiredAtText) expiredAtText.textContent = "-";
        }
      }

      toggleButton?.addEventListener("click", () => {
        if (!passwordText) return;

        const isVisible = passwordText.dataset.visible === "true";
        passwordText.textContent = isVisible ? "********" : (passwordText.dataset.passwordValue || "");
        passwordText.dataset.visible = isVisible ? "false" : "true";
        toggleButton.setAttribute("aria-label", isVisible ? "Lihat password" : "Sembunyikan password");
        eyeOpen?.classList.toggle("hidden", !isVisible);
        eyeClosed?.classList.toggle("hidden", isVisible);
      });

      function setComplaintStatus(message, tone) {
        if (!complaintStatus) return;

        const toneClass = tone === "error"
          ? "border-[#111111] bg-white text-[#111111]"
          : "border-[#e5e7eb] bg-[#fafafa] text-[#525252]";

        complaintStatus.className = `rounded-lg border px-3 py-2 text-sm font-medium ${toneClass}`;
        complaintStatus.textContent = message;
      }

      sendComplaintButton?.addEventListener("click", async () => {
        const email = complaintEmailInput?.value.trim() || "";
        const title = complaintTitleInput?.value.trim() || "";
        const description = complaintDescriptionInput?.value.trim() || "";

        if (!email || !title || !description) {
          setComplaintStatus("Lengkapi email, judul pengaduan, dan deskripsi pengaduan.", "error");
          return;
        }

        const originalText = sendComplaintButton.textContent;
        sendComplaintButton.disabled = true;
        sendComplaintButton.textContent = "Mengirim...";

        try {
          const response = await fetch("/oauth/pengaduan", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: email, judul: title, deskripsi: description }),
            credentials: "same-origin",
          });
          const result = await response.json();

          if (!response.ok || !result.success) {
            throw new Error(result.message || "Gagal mengirim pengaduan");
          }

          setComplaintStatus("Pengaduan berhasil dikirim ke admin.", "neutral");
          if (complaintTitleInput) complaintTitleInput.value = "";
          if (complaintDescriptionInput) complaintDescriptionInput.value = "";
          
          // Refresh list
          loadPengaduanHistory();
        } catch (error) {
          setComplaintStatus(error.message, "error");
        } finally {
          sendComplaintButton.disabled = false;
          sendComplaintButton.textContent = originalText;
        }
      });

      logoutButton?.addEventListener("click", async () => {
        logoutButton.disabled = true;
        try {
          await fetch("/oauth/logout", {
            method: "POST",
            credentials: "same-origin",
          });
        } finally {
          window.location.href = "/login";
        }
      });

      deleteAccountButton?.addEventListener("click", async () => {
        const confirmed = window.confirm("Hapus akun ini? Tindakan ini akan menghapus data akun client secara permanen.");
        if (!confirmed) return;

        const originalLabel = deleteAccountButton.textContent;
        deleteAccountButton.disabled = true;
        deleteAccountButton.textContent = "Menghapus...";

        try {
          const response = await fetch("/oauth/delete-account", {
            method: "POST",
            credentials: "same-origin",
          });
          const result = await response.json();

          if (!response.ok || !result.success) {
            throw new Error(result.message || "Gagal menghapus akun.");
          }

          window.alert("Akun berhasil dihapus.");
          window.location.href = "/login";
        } catch (error) {
          window.alert(error.message || "Gagal menghapus akun.");
          deleteAccountButton.disabled = false;
          deleteAccountButton.textContent = originalLabel || "Hapus Akun";
        }
      });

      function setChangePasswordStatus(message, tone) {
        if (!changePasswordStatus) return;

        const toneClass = tone === "error"
          ? "border-red-300 bg-red-50 text-red-700"
          : tone === "success"
            ? "border-green-300 bg-green-50 text-green-700"
            : "border-[#e5e7eb] bg-[#fafafa] text-[#525252]";

        changePasswordStatus.className = `mt-3 rounded-lg border px-3 py-2 text-sm font-medium ${toneClass}`;
        changePasswordStatus.textContent = message;
      }

      changePasswordSubmit?.addEventListener("click", async () => {
        const oldPassword = changePasswordOld?.value || "";
        const newPassword = changePasswordNew?.value || "";
        const confirmPassword = changePasswordConfirm?.value || "";

        if (!oldPassword || !newPassword || !confirmPassword) {
          setChangePasswordStatus("Lengkapi semua kolom password.", "error");
          return;
        }

        if (newPassword !== confirmPassword) {
          setChangePasswordStatus("Konfirmasi password baru tidak cocok.", "error");
          return;
        }

        const originalText = changePasswordSubmit.textContent;
        changePasswordSubmit.disabled = true;
        changePasswordSubmit.textContent = "Menyimpan...";

        try {
          const response = await fetch("/oauth/change-password", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              old_password: oldPassword,
              new_password: newPassword,
            }),
            credentials: "same-origin",
          });
          const result = await response.json();

          if (!response.ok || !result.success) {
            throw new Error(result.message || "Gagal mengubah password.");
          }

          setChangePasswordStatus("Password berhasil diubah. Email konfirmasi telah dikirim.", "success");
          if (changePasswordOld) changePasswordOld.value = "";
          if (changePasswordNew) changePasswordNew.value = "";
          if (changePasswordConfirm) changePasswordConfirm.value = "";
        } catch (error) {
          setChangePasswordStatus(error.message, "error");
        } finally {
          changePasswordSubmit.disabled = false;
          changePasswordSubmit.textContent = originalText;
        }
      });

      loadAccountProfile();
      loadPengaduanHistory();
    }

    function initScrapePage() {
      const groupInputs = pageContent.querySelectorAll('input[name="groups"]');
      const selectedCount = pageContent.querySelector("#scrape-selected-count");
      const memberCount = pageContent.querySelector("#scrape-member-count");
      const manualRows = pageContent.querySelector("#manual-contact-rows");
      const savedContactCount = pageContent.querySelector("#saved-contact-count");
      const contactDetailCard = pageContent.querySelector("#saved-contact-detail-card");
      const contactDetailTitle = pageContent.querySelector("#saved-contact-detail-title");
      const contactDetailList = pageContent.querySelector("#saved-contact-detail-list");
      const savedContactList = pageContent.querySelector("#saved-contact-list");
      const csvFileNameInput = pageContent.querySelector("#csv-contact-file-name");
      const csvFileInput = pageContent.querySelector("#csv-contact-file");
      const csvStatus = pageContent.querySelector("#csv-contact-status");
      const csvSaveButton = pageContent.querySelector("[data-save-csv-contact]");
      const manualFileNameInput = pageContent.querySelector("#manual-contact-file-name");
      const manualStatus = pageContent.querySelector("#manual-contact-status");
      const manualSaveButton = pageContent.querySelector("[data-save-manual-contact]");

      function updateSummary() {
        const selectedGroups = Array.from(groupInputs).filter((input) => input.checked);
        const totalMembers = selectedGroups.reduce((total, input) => {
          return total + Number(input.dataset.members || 0);
        }, 0);

        if (selectedCount) selectedCount.textContent = selectedGroups.length;
        if (memberCount) memberCount.textContent = totalMembers.toLocaleString("en-US");
      }

      function updateSavedContactCount() {
        const totalFiles = pageContent.querySelectorAll("[data-saved-contact]").length;
        if (savedContactCount) savedContactCount.textContent = `${totalFiles} file contact`;
      }

      function escapeText(value) {
        return value.replace(/[&<>"']/g, (char) => {
          const entities = {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            "\"": "&quot;",
            "'": "&#39;",
          };
          return entities[char];
        });
      }

      function setStatus(element, message, tone) {
        if (!element) return;
        const toneClass = tone === "error"
          ? "border-red-200 bg-red-50 text-red-700"
          : "border-green-200 bg-green-50 text-green-700";
        element.className = `mt-3 rounded-lg border px-3 py-2 text-sm font-medium ${toneClass}`;
        element.textContent = message;
        element.classList.remove("hidden");
      }

      function renderContactRows(dataTxt) {
        return String(dataTxt || "")
          .split(/\r?\n/)
          .filter(Boolean)
          .map((line) => {
            const [phone, ...nameParts] = line.split(",");
            return {
              phone: phone || "-",
              name: nameParts.join(",") || "-",
            };
          });
      }

      async function showContactDetail(item) {
        if (!contactDetailCard || !contactDetailTitle || !contactDetailList) return;

        const fileName = item.querySelector("p")?.textContent?.trim() || "contact.csv";
        contactDetailTitle.textContent = fileName;
        contactDetailList.innerHTML = '<p class="text-sm text-[#737373]">Memuat detail contact...</p>';
        contactDetailCard.classList.remove("hidden");

        let contacts = [];
        try {
          const response = await fetch(`/oauth/data-contact/${encodeURIComponent(item.dataset.contactId)}`, { credentials: "same-origin" });
          const result = await response.json();
          if (!response.ok || !result.success) {
            throw new Error(result.message || "Gagal mengambil detail contact");
          }
          contacts = renderContactRows(result.data?.data_txt);
        } catch (error) {
          contactDetailList.innerHTML = `<p class="text-sm text-red-600">${escapeText(error.message)}</p>`;
          return;
        }

        contactDetailList.innerHTML = contacts.map((contact) => `
          <div class="flex items-center justify-between gap-4 rounded-lg border border-[#e5e7eb] bg-[#fafafa] px-3 py-2">
            <div class="min-w-0">
              <p class="truncate text-sm font-semibold text-[#111111]">${escapeText(contact.phone)}</p>
              <p class="mt-0.5 truncate text-xs text-[#737373]">${escapeText(contact.name)}</p>
            </div>
            <span class="shrink-0 rounded border border-[#d4d4d4] bg-white px-2 py-1 text-xs font-medium text-[#525252]">Contact</span>
          </div>
        `).join("");
      }

      function hideContactDetail() {
        contactDetailCard?.classList.add("hidden");
      }

      function getManualContactRow() {
        return `
          <div class="grid grid-cols-1 gap-3 sm:grid-cols-[minmax(0,1fr)_minmax(0,1fr)_44px]" data-manual-contact-row>
            <label class="block">
              <span class="mb-1.5 block text-sm font-medium text-[#525252]">Nomor telepon</span>
              <input class="w-full rounded-lg border border-[#d4d4d4] bg-white px-3 py-2.5 text-sm text-[#111111] placeholder:text-[#a3a3a3] focus:border-[#111111] focus:outline-none focus:ring-1 focus:ring-[#111111]" type="tel" placeholder="6281234567890">
            </label>
            <label class="block">
              <span class="mb-1.5 block text-sm font-medium text-[#525252]">Nama opsional</span>
              <input class="w-full rounded-lg border border-[#d4d4d4] bg-white px-3 py-2.5 text-sm text-[#111111] placeholder:text-[#a3a3a3] focus:border-[#111111] focus:outline-none focus:ring-1 focus:ring-[#111111]" type="text" placeholder="Nama contact">
            </label>
            <button class="mt-0 flex h-11 w-full items-center justify-center rounded-lg border border-[#d4d4d4] bg-white text-lg font-semibold text-[#111111] transition-colors hover:border-[#111111] hover:bg-[#111111] hover:text-white sm:mt-[26px]" type="button" data-remove-manual-contact aria-label="Hapus contact manual">
              -
            </button>
          </div>
        `;
      }

      function renderSavedContacts(items) {
        if (!savedContactList) return;
        if (!items.length) {
          savedContactList.innerHTML = '<div class="px-4 py-6 text-center text-sm text-[#737373]">Belum ada data contact tersimpan.</div>';
          updateSavedContactCount();
          return;
        }

        savedContactList.innerHTML = items.map((item) => `
          <div class="grid gap-3 px-4 py-4 md:grid-cols-[minmax(220px,1.4fr)_200px_140px_100px_160px] md:items-center" data-saved-contact data-contact-id="${escapeText(item.id)}">
            <div class="min-w-0">
              <p class="truncate font-semibold text-[#111111]">${escapeText(item.nama_file || "contact.txt")}</p>
              <p class="mt-1 text-xs text-[#737373] md:hidden">${escapeText(item.tanggal_dibuat || "-")}</p>
            </div>
            <p class="hidden text-sm text-[#525252] md:block">${escapeText(item.tanggal_dibuat || "-")}</p>
            <div class="flex items-center justify-between rounded-lg bg-[#fafafa] px-3 py-2 text-sm md:block md:bg-transparent md:px-0 md:py-0">
              <span class="text-[#737373] md:hidden">Total Contact</span>
              <span class="font-semibold text-[#111111]">${Number(item.total_contact || 0).toLocaleString("id-ID")}</span>
            </div>
            <span class="w-fit rounded border border-[#d4d4d4] bg-[#fafafa] px-2 py-1 text-xs font-medium uppercase text-[#525252]">TXT</span>
            <div class="flex flex-wrap gap-2 md:justify-end">
              <button class="inline-flex items-center justify-center rounded-lg border border-[#d4d4d4] bg-white px-3 py-2 text-sm font-semibold text-[#111111] transition-colors hover:border-[#111111] hover:bg-[#111111] hover:text-white" type="button" data-show-saved-contact-detail>
                Detail
              </button>
              <button class="inline-flex items-center justify-center rounded-lg border border-[#d4d4d4] bg-white px-3 py-2 text-sm font-semibold text-[#111111] transition-colors hover:border-[#111111] hover:bg-[#111111] hover:text-white" type="button" data-delete-saved-contact>
                Delete
              </button>
            </div>
          </div>
        `).join("");
        updateSavedContactCount();
      }

      async function loadSavedContacts() {
        if (!savedContactList) return;
        try {
          const response = await fetch("/oauth/data-contact", { credentials: "same-origin" });
          const result = await response.json();
          if (!response.ok || !result.success) {
            throw new Error(result.message || "Gagal memuat data contact");
          }
          renderSavedContacts(result.data || []);
        } catch (error) {
          savedContactList.innerHTML = `<div class="px-4 py-6 text-center text-sm text-red-600">${escapeText(error.message)}</div>`;
          updateSavedContactCount();
        }
      }

      groupInputs.forEach((input) => {
        input.addEventListener("change", updateSummary);
      });

      if (manualRows) {
        manualRows.addEventListener("click", (event) => {
          const target = event.target;
          if (!(target instanceof Element)) return;

          if (target.closest("[data-add-manual-contact]")) {
            manualRows.insertAdjacentHTML("beforeend", getManualContactRow());
            return;
          }

          const removeButton = target.closest("[data-remove-manual-contact]");
          if (removeButton) {
            removeButton.closest("[data-manual-contact-row]")?.remove();
          }
        });
      }

      savedContactList?.addEventListener("click", async (event) => {
        const target = event.target;
        if (!(target instanceof Element)) return;

        const detailButton = target.closest("[data-show-saved-contact-detail]");
        if (detailButton) {
          const item = detailButton.closest("[data-saved-contact]");
          if (item) showContactDetail(item);
          return;
        }

        const deleteButton = target.closest("[data-delete-saved-contact]");
        if (deleteButton) {
          const item = deleteButton.closest("[data-saved-contact]");
          const id = item?.dataset.contactId;
          if (!id || !window.confirm("Hapus data contact ini?")) return;
          await fetch(`/oauth/data-contact/${encodeURIComponent(id)}`, {
            method: "DELETE",
            credentials: "same-origin",
          });
          hideContactDetail();
          loadSavedContacts();
        }
      });

      pageContent.querySelector("[data-close-contact-detail]")?.addEventListener("click", hideContactDetail);

      csvSaveButton?.addEventListener("click", async () => {
        const file = csvFileInput?.files?.[0] || null;
        if (!file) {
          setStatus(csvStatus, "Pilih file CSV terlebih dahulu.", "error");
          return;
        }
        csvSaveButton.disabled = true;
        const originalText = csvSaveButton.textContent;
        csvSaveButton.textContent = "Menyimpan...";
        try {
          const formData = new FormData();
          formData.append("nama_file", csvFileNameInput?.value || file.name);
          formData.append("file", file);
          const response = await fetch("/oauth/data-contact/csv", {
            method: "POST",
            body: formData,
            credentials: "same-origin",
          });
          const result = await response.json();
          if (!response.ok || !result.success) throw new Error(result.message || "Gagal menyimpan CSV");
          if (csvFileInput) csvFileInput.value = "";
          if (csvFileNameInput) csvFileNameInput.value = "";
          setStatus(csvStatus, result.message || "Data contact berhasil disimpan.", "success");
          loadSavedContacts();
        } catch (error) {
          setStatus(csvStatus, error.message, "error");
        } finally {
          csvSaveButton.disabled = false;
          csvSaveButton.textContent = originalText;
        }
      });

      manualSaveButton?.addEventListener("click", async () => {
        const contacts = Array.from(pageContent.querySelectorAll("[data-manual-contact-row]")).map((row) => {
          const inputs = row.querySelectorAll("input");
          return {
            phone: inputs[0]?.value.trim() || "",
            name: inputs[1]?.value.trim() || "",
          };
        }).filter((contact) => contact.phone);

        manualSaveButton.disabled = true;
        const originalText = manualSaveButton.textContent;
        manualSaveButton.textContent = "Menyimpan...";
        try {
          const response = await fetch("/oauth/data-contact/manual", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              nama_file: manualFileNameInput?.value || "contact-manual.txt",
              contacts,
            }),
            credentials: "same-origin",
          });
          const result = await response.json();
          if (!response.ok || !result.success) throw new Error(result.message || "Gagal menyimpan contact manual");
          if (manualFileNameInput) manualFileNameInput.value = "";
          pageContent.querySelectorAll("[data-manual-contact-row] input").forEach((input) => { input.value = ""; });
          setStatus(manualStatus, result.message || "Data contact berhasil disimpan.", "success");
          loadSavedContacts();
        } catch (error) {
          setStatus(manualStatus, error.message, "error");
        } finally {
          manualSaveButton.disabled = false;
          manualSaveButton.textContent = originalText;
        }
      });

      updateSummary();
      loadSavedContacts();
    }

    function initHistoryPage() {
      const totalCount = pageContent.querySelector("#history-total-count");
      const successTotal = pageContent.querySelector("#history-success-total");
      const failedTotal = pageContent.querySelector("#history-failed-total");
      const averageRate = pageContent.querySelector("#history-average-rate");

      function getItems() {
        return Array.from(pageContent.querySelectorAll("[data-history-item]"));
      }

      function updateHistorySummary() {
        const items = getItems();
        const totalSuccess = items.reduce((total, item) => total + Number(item.dataset.success || 0), 0);
        const totalFailed = items.reduce((total, item) => total + Number(item.dataset.failed || 0), 0);
        const percentage = totalSuccess + totalFailed > 0
          ? (totalSuccess / (totalSuccess + totalFailed)) * 100
          : 0;

        if (totalCount) totalCount.textContent = items.length;
        if (successTotal) successTotal.textContent = totalSuccess.toLocaleString("en-US");
        if (failedTotal) failedTotal.textContent = totalFailed.toLocaleString("en-US");
        if (averageRate) averageRate.textContent = `${percentage.toFixed(1)}%`;
      }

      pageContent.querySelectorAll("[data-delete-history]").forEach((button) => {
        button.addEventListener("click", () => {
          button.closest("[data-history-item]")?.remove();
          updateHistorySummary();
        });
      });

      updateHistorySummary();
    }

    // Handle browser back/forward
    window.addEventListener("popstate", () => {
      loadPage(getInitialPage());
    });
  </script>
</body>
</html>
